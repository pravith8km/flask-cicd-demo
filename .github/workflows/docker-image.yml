name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t flask-cicd-demo:$(date +%s) .

    - name: Run container (test)
      run: docker run -d -p 5000:5000 flask-cicd-demo

    - name: Health check
      run: |
        sleep 5
        curl http://localhost:5000/health
